<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actividades Pendientes - I-2026</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.header-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}
.header-line .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00ff41;
  box-shadow: 0 0 6px #00ff41;
  animation: blink 2s ease-in-out infinite;
}
.total-badge {
  display: inline-block;
  font-size: 8px;
  letter-spacing: 0.1em;
  color: rgba(0,255,65,0.35);
  padding: 2px 7px;
  border: 1px solid rgba(0,255,65,0.1);
  border-radius: 3px;
  margin-left: auto;
}
.course-group {
  margin-bottom: 20px;
}
.course-group:last-child {
  margin-bottom: 0;
}
.course-name {
  font-size: 12px;
  font-weight: 700;
  color: rgba(0,255,65,0.9);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(0,255,65,0.1);
}
.ck-code {
  font-size: 8px;
  color: rgba(0,255,65,0.25);
  margin-left: 6px;
  font-weight: 400;
  letter-spacing: 0.1em;
}
.tag-optional {
  background: rgba(245,158,11,0.1);
  color: rgba(245,158,11,0.6);
}
.tag-instalacion {
  background: rgba(0,132,255,0.1);
  color: rgba(0,132,255,0.6);
}
.tag-investigacion {
  background: rgba(168,85,247,0.1);
  color: rgba(168,85,247,0.6);
}
.meta-label {
  color: rgba(0,255,65,0.25);
  margin-right: 4px;
}
.no-activities {
  font-size: 9px;
  color: rgba(0,255,65,0.2);
  padding: 8px 0;
  font-style: italic;
}
</style>
</head>
<body>

<div class="crt">
  <div class="screen" id="app"></div>
</div>

<script src="data/site-data.js"></script>
<script>
(function () {
  var app = document.getElementById('app');
  var activities = window.FEC_DATA.activities;
  var courses = window.FEC_DATA.courses;

  var courseMap = {};
  courses.forEach(function (c) { courseMap[c.ck] = c.name; });

  var tagMap = {
    'tarea':         { cls: 'tag-hw',            label: 'TAREA' },
    'opcional':      { cls: 'tag-optional',      label: 'OPCIONAL' },
    'instalacion':   { cls: 'tag-instalacion',   label: 'INSTALACION' },
    'investigacion': { cls: 'tag-investigacion', label: 'INVESTIGACION' },
    'examen':        { cls: 'tag-exam',          label: 'EXAMEN' },
    'material':      { cls: 'tag-material',      label: 'MATERIAL' }
  };

  var total = 0;
  Object.keys(activities).forEach(function (ck) { total += activities[ck].length; });

  var html = '';

  html += '<div class="section-label">sistema academico // i-2026</div>';
  html += '<div class="header-line">';
  html += '  <span class="dot"></span>';
  html += '  <span class="glow" style="font-size:15px;font-weight:700;letter-spacing:0.04em;">ACTIVIDADES PENDIENTES</span>';
  html += '  <span class="total-badge">' + total + ' PENDIENTE' + (total !== 1 ? 'S' : '') + '</span>';
  html += '</div>';
  html += '<a href="index.html" class="back-link glow-dim">&larr; ../inicio</a>';

  var hasAny = false;

  Object.keys(activities).forEach(function (ck) {
    var items = activities[ck];
    if (!items || items.length === 0) return;
    hasAny = true;
    var name = courseMap[ck] || ck;

    html += '<div class="course-group">';
    html += '  <div class="course-name glow-dim">' + name + '<span class="ck-code">[' + ck + ']</span></div>';

    items.forEach(function (act) {
      var tag = tagMap[act.type] || { cls: 'tag-hw', label: act.type.toUpperCase() };

      html += '<div class="activity-item">';
      html += '  <span class="activity-tag ' + tag.cls + '">' + tag.label + '</span>';
      html += '  <div class="activity-title">' + act.title + '</div>';

      if (act.desc) {
        html += '  <div class="activity-desc">' + act.desc + '</div>';
      }

      html += '  <div class="activity-meta">';
      if (act.assigned) {
        html += '    <span><span class="meta-label">ASIGNADO:</span>' + act.assigned + '</span>';
      }
      if (act.due) {
        html += '    <span class="pending"><span class="meta-label">ENTREGA:</span>' + act.due + '</span>';
      }
      if (act.material) {
        html += '    <span><span class="meta-label">MATERIAL:</span>' + act.material + '</span>';
      }
      html += '  </div>';
      html += '</div>';
    });

    html += '</div>';
  });

  if (!hasAny) {
    html += '<div class="no-activities">No hay actividades pendientes.</div>';
  }

  html += '<div style="margin-top:18px;font-size:9px;color:rgba(0,255,65,0.2);" class="cursor-blink">fin del listado</div>';

  app.innerHTML = html;
})();
</script>

</body>
</html>
