<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupos - I-2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { mono: ['JetBrains Mono', 'monospace'] } } }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #050505;
      color: #00ff41;
      min-height: 100vh;
    }
    .crt {
      position: relative;
      border-radius: 18px;
      padding: 3px;
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      box-shadow: 0 0 60px rgba(0,255,65,0.07), 0 0 2px rgba(0,255,65,0.3), inset 0 0 80px rgba(0,0,0,0.8);
    }
    .crt::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      z-index: 50;
    }
    .crt::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: radial-gradient(ellipse at 30% 20%, rgba(0,255,65,0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 51;
    }
    .screen {
      background: #0a0a0a;
      border-radius: 15px;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    .screen::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 15px;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 40;
    }
    @keyframes flicker {
      0%,100%{opacity:1}92%{opacity:1}93%{opacity:.85}94%{opacity:1}96%{opacity:.9}97%{opacity:1}
    }
    .screen { animation: flicker 8s infinite; }
    .glow { text-shadow: 0 0 6px rgba(0,255,65,0.5), 0 0 20px rgba(0,255,65,0.15); }
    .glow-dim { text-shadow: 0 0 4px rgba(0,255,65,0.3); }
    .glow-box { box-shadow: 0 0 8px rgba(0,255,65,0.08), inset 0 0 8px rgba(0,255,65,0.03); }
    .group-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid rgba(0,255,65,0.08);
      border-radius: 6px;
      transition: all 0.15s;
      background: rgba(0,255,65,0.015);
    }
    .group-row:hover {
      background: rgba(0,255,65,0.06);
      border-color: rgba(0,255,65,0.25);
    }
    .btn-group {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-wa {
      border: 1px solid rgba(37,211,102,0.3);
      color: #25d366;
      background: rgba(37,211,102,0.06);
    }
    .btn-wa:hover {
      background: rgba(37,211,102,0.15);
      border-color: rgba(37,211,102,0.5);
      box-shadow: 0 0 10px rgba(37,211,102,0.1);
    }
    .btn-tg {
      border: 1px solid rgba(0,136,204,0.3);
      color: #0088cc;
      background: rgba(0,136,204,0.06);
    }
    .btn-tg:hover {
      background: rgba(0,136,204,0.15);
      border-color: rgba(0,136,204,0.5);
      box-shadow: 0 0 10px rgba(0,136,204,0.1);
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
    .cursor-blink::after {
      content: '█';
      animation: blink 1s step-end infinite;
      margin-left: 2px;
      font-size: 0.8em;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(0,255,65,0.4);
      text-decoration: none;
      font-size: 11px;
      transition: color 0.15s;
      margin-bottom: 16px;
    }
    .back-link:hover { color: #00ff41; }
  </style>
</head>
<body class="p-4 md:p-8 flex items-start justify-center">
  <div class="crt w-full max-w-2xl">
    <div class="screen">

      <a href="index.html" class="back-link glow-dim">&larr; ../inicio</a>

      <div class="flex items-center gap-3 mb-1">
        <span class="text-[10px] tracking-widest uppercase glow-dim" style="color:rgba(0,255,65,0.4)">sys@universidad</span>
        <span class="text-[10px]" style="color:rgba(0,255,65,0.2)">~</span>
        <span class="text-[10px] tracking-widest uppercase glow-dim" style="color:rgba(0,255,65,0.4)">grupos_query</span>
      </div>

      <p class="text-xs mb-4 glow-dim" style="color:rgba(0,255,65,0.35)">$ cat /grupos/seccion2.dat</p>

      <h1 class="text-lg md:text-xl font-bold glow tracking-tight mb-1">GRUPOS DE MATERIAS</h1>
      <p class="text-[11px] mb-5 glow-dim" style="color:rgba(0,255,65,0.4)">1er. Semestre &mdash; Seccion 2 &mdash; I-2026</p>

      <div class="flex flex-col gap-2 mb-6" id="groups"></div>

      <p class="text-[10px] cursor-blink glow-dim" style="color:rgba(0,255,65,0.3)">$ _</p>

    </div>
  </div>

  <script>
    const data = [
      {
        name: 'PPI - Introduccion a la computacion y SHA',
        platform: 'wa',
        url: 'https://chat.whatsapp.com/DWMd6nkpg1O3pDOcWf7OXc?mode=gi_t'
      },
      {
        name: 'Algoritmos y Programacion I',
        platform: 'tg',
        url: 'https://t.me/+eOblYHAxTas4M2Rh'
      },
      {
        name: 'Logica Matematica',
        platform: 'wa',
        url: 'https://chat.whatsapp.com/EKEJEgShvGG7ITB1svLtq8?mode=gi_t'
      },
      {
        name: 'Sub-Area Comunicacion y Lenguaje',
        platform: 'wa',
        url: 'https://chat.whatsapp.com/DZBTbi2rdvkAww3Iy4US5C?mode=gi_t'
      },
      {
        name: 'Orientacion I',
        platform: 'tg',
        url: 'https://t.me/+kXYWVqGj8v4wOTQx'
      },
      {
        name: 'Calculo I',
        platform: 'wa',
        url: 'https://chat.whatsapp.com/I6s368JjVsv5eWfm4rXhM3?mode=gi_t'
      }
    ];

    const el = document.getElementById('groups');

    data.forEach(item => {
      const isWa = item.platform === 'wa';
      const tag = isWa ? 'WHATSAPP' : 'TELEGRAM';
      const btnClass = isWa ? 'btn-wa' : 'btn-tg';
      const icon = isWa ? 'fa-brands fa-whatsapp' : 'fa-brands fa-telegram';

      const row = document.createElement('div');
      row.className = 'group-row';
      row.innerHTML = `
        <div>
          <p class="text-[11px] font-semibold glow-dim" style="color:rgba(0,255,65,0.7)">${item.name}</p>
          <span class="text-[8px] tracking-wider" style="color:rgba(0,255,65,0.25)">[${tag}]</span>
        </div>
        <a href="${item.url}" target="_blank" class="btn-group ${btnClass}">
          <i class="${icon}" style="font-size:11px"></i>
          ${tag}
        </a>
      `;
      el.appendChild(row);
    });
  </script>
</body>
</html>
