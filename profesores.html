<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesores - I-2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { mono: ['JetBrains Mono', 'monospace'] } } }
    }
  </script>
  <script src="data/site-data.js"></script>
</head>
<body class="p-4 md:p-8 flex items-start justify-center">
  <div class="crt w-full max-w-4xl">
    <div class="screen">
      <a href="index.html" class="back-link glow-dim">&larr; ../inicio</a>

      <div class="flex items-center gap-3 mb-1">
        <span class="text-[10px] tracking-widest uppercase glow-dim" style="color:rgba(0,255,65,0.4)">sys@universidad</span>
        <span class="text-[10px]" style="color:rgba(0,255,65,0.2)">~</span>
        <span class="text-[10px] tracking-widest uppercase glow-dim" style="color:rgba(0,255,65,0.4)">profesores_contacto</span>
      </div>

      <p class="text-xs mb-4 glow-dim" style="color:rgba(0,255,65,0.35)">$ cat /contacto/profesores.dat</p>

      <h1 class="text-lg md:text-xl font-bold glow tracking-tight mb-1">PROFESORES</h1>
      <p class="text-[11px] mb-5 glow-dim" style="color:rgba(0,255,65,0.4)">1er. Semestre &mdash; Seccion 2 &mdash; I-2026</p>

      <div class="grid grid-cols-1 gap-5">
        <div>
          <div class="section-label glow-dim">[ Profesores ]</div>
          <div id="professors-list"></div>
        </div>
      </div>

      <p class="text-[10px] cursor-blink glow-dim" style="color:rgba(0,255,65,0.3)">$ _</p>
    </div>
  </div>
  <script>
    function renderProfessors() {
      const container = document.getElementById('professors-list');
      if (!container || !window.FEC_DATA) return;
      container.innerHTML = '';
      window.FEC_DATA.professors.forEach((prof) => {
        const card = document.createElement('div');
        card.className = 'info-card glow-box mb-4';
        card.innerHTML = `
          <div class="info-label">${prof.name}</div>
          <div class="info-value">${prof.course}</div>
          <p class="text-[9px] mt-2" style="color:rgba(0,255,65,0.55)">Correo: ${prof.email}</p>
        `;
        container.appendChild(card);
      });
    }
    renderProfessors();
  </script>
    </div>
  </div>
</body>
</html>
